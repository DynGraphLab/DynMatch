<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0f1328"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="250"/>
    <line x1="300" y1="0" x2="300" y2="250"/>
    <line x1="400" y1="0" x2="400" y2="250"/>
  </g>

  <!-- Graph visualization - Left side -->
  <g transform="translate(40, 20)">
    <!-- Unmatched edges (gray) -->
    <line x1="80" y1="45" x2="170" y2="80" stroke="#475569" stroke-width="2" opacity="0.5"/>
    <line x1="170" y1="80" x2="250" y2="45" stroke="#475569" stroke-width="2" opacity="0.5"/>
    <line x1="80" y1="45" x2="80" y2="130" stroke="#475569" stroke-width="2" opacity="0.5"/>
    <line x1="250" y1="45" x2="330" y2="80" stroke="#475569" stroke-width="2" opacity="0.5"/>
    <line x1="170" y1="80" x2="170" y2="165" stroke="#475569" stroke-width="2" opacity="0.5"/>
    <line x1="250" y1="45" x2="250" y2="130" stroke="#475569" stroke-width="2" opacity="0.5"/>

    <!-- Matched edges (green/emerald, highlighted) -->
    <line x1="80" y1="45" x2="170" y2="45" stroke="#34d399" stroke-width="3.5" filter="url(#glow)"/>
    <line x1="250" y1="130" x2="330" y2="80" stroke="#34d399" stroke-width="3.5" filter="url(#glow)"/>
    <line x1="80" y1="130" x2="170" y2="165" stroke="#34d399" stroke-width="3.5" filter="url(#glow)"/>
    <line x1="250" y1="45" x2="330" y2="165" stroke="#34d399" stroke-width="3.5" filter="url(#glow)"/>
    <line x1="170" y1="80" x2="250" y2="130" stroke="#34d399" stroke-width="3.5" filter="url(#glow)"/>

    <!-- Nodes -->
    <circle cx="80" cy="45" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>
    <circle cx="170" cy="45" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>
    <circle cx="170" cy="80" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>
    <circle cx="250" cy="45" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>
    <circle cx="330" cy="80" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>
    <circle cx="80" cy="130" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>
    <circle cx="170" cy="165" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>
    <circle cx="250" cy="130" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>
    <circle cx="330" cy="165" r="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#nodeGlow)"/>

    <!-- Legend -->
    <line x1="200" y1="200" x2="230" y2="200" stroke="#34d399" stroke-width="3"/>
    <text x="236" y="204" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Matched edges</text>
    <line x1="200" y1="218" x2="230" y2="218" stroke="#475569" stroke-width="2" opacity="0.5"/>
    <text x="236" y="222" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Unmatched edges</text>
  </g>

  <!-- Text - Right side -->
  <g transform="translate(500, 0)">
    <!-- DynMatch title -->
    <text x="180" y="115" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="700">
      <tspan fill="#60a5fa">Dyn</tspan><tspan fill="#e2e8f0">Match</tspan>
    </text>
    <!-- Subtitle -->
    <text x="180" y="150" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-style="italic">
      Dynamic Matching in Practice
    </text>
  </g>
</svg>
